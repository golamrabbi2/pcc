<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>PCC - 404 Page Not Found</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error-container": "#93000a",
                    "surface-tint": "#0053db",
                    "on-primary-fixed": "#00174b",
                    "surface-container-high": "#e7e7f3",
                    "primary": "#004ac6",
                    "tertiary": "#943700",
                    "on-primary-container": "#eeefff",
                    "on-background": "#191b23",
                    "tertiary-fixed-dim": "#ffb596",
                    "on-tertiary-fixed": "#360f00",
                    "surface-container-low": "#f3f3fe",
                    "background": "#faf8ff",
                    "secondary-fixed": "#e2e2e2",
                    "surface-container": "#ededf9",
                    "outline": "#737686",
                    "on-secondary-fixed": "#1a1c1c",
                    "secondary-container": "#e2e2e2",
                    "secondary": "#5d5f5e",
                    "surface-container-highest": "#e1e2ed",
                    "on-secondary-container": "#636564",
                    "on-error": "#ffffff",
                    "on-tertiary-container": "#ffede6",
                    "outline-variant": "#c3c6d7",
                    "primary-fixed-dim": "#b4c5ff",
                    "surface-dim": "#d9d9e5",
                    "on-surface": "#191b23",
                    "error": "#ba1a1a",
                    "inverse-primary": "#b4c5ff",
                    "primary-fixed": "#dbe1ff",
                    "on-secondary-fixed-variant": "#454747",
                    "error-container": "#ffdad6",
                    "secondary-fixed-dim": "#c6c7c6",
                    "inverse-on-surface": "#f0f0fb",
                    "surface": "#faf8ff",
                    "surface-bright": "#faf8ff",
                    "surface-variant": "#e1e2ed",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-primary": "#ffffff",
                    "on-surface-variant": "#434655",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#ffdbcd",
                    "primary-container": "#2563eb",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "tertiary-container": "#bc4800",
                    "inverse-surface": "#2e3039",
                    "on-secondary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base_grid": "4px",
                    "sidebar_width": "240px",
                    "padding_lg": "24px",
                    "max_width": "1280px",
                    "gutter": "24px",
                    "padding_md": "16px",
                    "padding_sm": "8px"
            },
            "fontFamily": {
                    "h2": ["Inter"],
                    "metadata": ["Inter"],
                    "h3": ["Inter"],
                    "body": ["Inter"],
                    "h1": ["Inter"],
                    "code": ["JetBrains Mono"]
            },
            "fontSize": {
                    "h2": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "metadata": ["12px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "400"}],
                    "h3": ["15px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "600"}],
                    "body": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}],
                    "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "code": ["12px", {"lineHeight": "16px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #F5F5F4;
            overflow: hidden;
        }
        .canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
        }
        .error-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #E7E5E4;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 48;
        }
    </style>
</head>
<body class="font-body text-body selection:bg-primary-fixed selection:text-on-primary-fixed h-screen flex items-center justify-center">
<!-- Decorative Subtle Background Pattern -->
<div class="canvas-bg">
<svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern height="40" id="grid" patternUnits="userSpaceOnUse" width="40">
<path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E7E5E4" stroke-width="1"></path>
</pattern>
</defs>
<rect fill="url(#grid)" height="100%" width="100%"></rect>
</svg>
</div>
<main class="relative z-10 flex flex-col items-center max-w-[480px] w-full px-padding_lg animate-in fade-in zoom-in duration-700">
<!-- Error Graphic Container -->
<div class="mb-8 flex items-center justify-center w-32 h-32 rounded-full bg-white error-card">
<span class="material-symbols-outlined text-primary" data-icon="search_off" style="font-size: 64px;">search_off</span>
</div>
<!-- Typography Cluster -->
<div class="text-center mb-10">
<h1 class="font-h1 text-h1 text-on-surface mb-3">Page not found</h1>
<p class="font-body text-on-surface-variant max-w-sm mx-auto leading-relaxed">
                The page you're looking for doesn't exist or has been moved. It might have been deleted or the URL could be incorrect.
            </p>
</div>
<!-- Action Area -->
<div class="flex flex-col sm:flex-row items-center gap-4 w-full justify-center">
<a class="w-full sm:w-auto inline-flex items-center justify-center px-8 py-3 bg-primary text-white font-h2 text-h2 rounded-lg transition-all duration-200 hover:bg-[#003ea8] hover:shadow-lg active:scale-95" href="#">
                Go to Dashboard
            </a>
<button class="w-full sm:w-auto inline-flex items-center justify-center px-8 py-3 bg-white text-on-surface-variant font-h2 text-h2 rounded-lg border border-outline-variant transition-all duration-200 hover:bg-surface-container-low hover:text-on-surface" onclick="window.history.back()">
                Go Back
            </button>
</div>
<!-- Bottom Assistance Context (Bento Style Sub-info) -->
<div class="mt-16 grid grid-cols-2 gap-4 w-full">
<div class="bg-white/80 backdrop-blur-sm p-4 rounded-xl error-card flex flex-col gap-2">
<span class="material-symbols-outlined text-secondary text-xl" data-icon="support_agent">support_agent</span>
<div>
<div class="font-h3 text-h3 text-on-surface">Help Center</div>
<div class="font-metadata text-metadata text-on-surface-variant">Read documentation</div>
</div>
</div>
<div class="bg-white/80 backdrop-blur-sm p-4 rounded-xl error-card flex flex-col gap-2">
<span class="material-symbols-outlined text-secondary text-xl" data-icon="report">report</span>
<div>
<div class="font-h3 text-h3 text-on-surface">Report Issue</div>
<div class="font-metadata text-metadata text-on-surface-variant">Notify PCC admin</div>
</div>
</div>
</div>
<footer class="mt-12 text-center">
<p class="font-metadata text-metadata text-outline">
                Error Code: <span class="font-code text-code bg-surface-variant px-2 py-0.5 rounded">404_PAGE_MISSING_PCC</span>
</p>
</footer>
</main>
<!-- Floating Graphic Elements for Depth -->
<div class="absolute top-20 right-[15%] w-24 h-24 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-20 left-[10%] w-32 h-32 bg-tertiary/5 rounded-full blur-3xl"></div>
<script>
        // Micro-interaction for the search icon to pulse on hover of the card
        const card = document.querySelector('.error-card');
        const icon = document.querySelector('[data-icon="search_off"]');

        card.addEventListener('mouseenter', () => {
            icon.classList.add('scale-110', 'rotate-12', 'transition-transform', 'duration-300');
        });

        card.addEventListener('mouseleave', () => {
            icon.classList.remove('scale-110', 'rotate-12');
        });

        // Add a subtle parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            
            document.querySelector('.canvas-bg').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body></html>
